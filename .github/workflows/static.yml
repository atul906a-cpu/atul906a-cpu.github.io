<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Well Soon Shraddha 🌷</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet"><style>

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#ffd6e7,#ffe9c9,#e0f7ff);
  overflow:hidden;
}

/* floating hearts */
.heart{
  position:absolute;
  color:#ff6b8a;
  animation:float 6s linear infinite;
  opacity:0.6;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0.8);} 
  100%{transform:translateY(-10vh) scale(1.2);} 
}

.card{
  background:white;
  padding:45px;
  border-radius:25px;
  text-align:center;
  max-width:460px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  position:relative;
  z-index:2;
}

h1{
  font-family:'Playfair Display',serif;
  color:#ff4d6d;
  margin-bottom:10px;
}

.name{
  font-size:28px;
  color:#333;
  margin-bottom:20px;
}

p{
  line-height:1.7;
  color:#555;
  font-size:16px;
}

button{
  margin-top:25px;
  padding:12px 24px;
  border:none;
  border-radius:12px;
  background:#ff4d6d;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  background:#ff2f58;
}

/* second screen overlay */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,#fff3f7,#ffe7d6);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:30px;
  z-index:5;
}

.overlay h2{
  font-family:'Playfair Display',serif;
  color:#ff4d6d;
  margin-bottom:10px;
}

.overlay p{
  max-width:500px;
}

.gif-group{
  margin-top:20px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.gif-group img{
  width:130px;
  border-radius:14px;
}

</style></head><body><!-- floating hearts --><div class="heart" style="left:10%;animation-duration:7s">❤</div>
<div class="heart" style="left:25%;animation-duration:9s">❤</div>
<div class="heart" style="left:40%;animation-duration:8s">❤</div>
<div class="heart" style="left:60%;animation-duration:6s">❤</div>
<div class="heart" style="left:75%;animation-duration:10s">❤</div>
<div class="heart" style="left:90%;animation-duration:7s">❤</div><div class="card"><h1>Get Well Soon</h1><div class="name">Dear Shraddha</div><p>
Even when the days feel heavy and your body feels tired, remember that healing takes time and gentleness.
Take rest, breathe slowly, and allow yourself the space to recover.
Someone out here is wishing that your smile returns very soon.
</p><button onclick="openMessage()">Click for another message 💌</button>

</div><!-- second message page --><div class="overlay" id="overlay"><h2>Hey… Get Well Soon 🌷</h2><p>
Hey, I heard you’re not feeling well. Just wanted to say take proper rest and don’t push yourself too much right now. Your health matters more than anything, so try to relax, drink plenty of water, and give your body the time it needs to recover.

I really hope you start feeling better soon. Being sick can be exhausting, but this phase will pass and you’ll be back to your normal self again. Until then, just focus on resting and taking care of yourself.

Wishing you a quick recovery and lots of strength. Get well soon. 🙂
I miss talking to you and I really hope you start feeling better soon.
Take your time to heal and rest properly.
Someone out here is quietly wishing for your smile to return again.
</p><div class="gif-group">
  <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
  <img src="https://media.giphy.com/media/l4pTdcifPZLpDjL1e/giphy.gif">
  <img src="https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif">
</div></div><script>
function openMessage(){
  document.getElementById('overlay').style.display='flex';
}
</script></body>
</html>
